# Signal Monitor — nginx reverse proxy configuration
#
# Install: copy to /etc/nginx/sites-available/signal-monitor
#          ln -s /etc/nginx/sites-available/signal-monitor /etc/nginx/sites-enabled/
#          nginx -t && systemctl reload nginx
#
# Prerequisites:
#   - Signal Monitor running on localhost:8080 (docker compose up -d)
#   - TLS certificate (e.g. certbot --nginx -d sigmon.example.com)

server {
    listen 80;
    server_name sigmon.example.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name sigmon.example.com;

    # TLS — adjust paths to your cert/key
    ssl_certificate     /etc/letsencrypt/live/sigmon.example.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sigmon.example.com/privkey.pem;

    # Proxy to Signal Monitor
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket upgrade for /ws
    location /ws {
        proxy_pass http://127.0.0.1:8080/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
