server {
    listen 80;
    server_name asterix.gluino.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name asterix.gluino.com;

    # TLS — adjust paths to your cert/key
    ssl_certificate     /etc/letsencrypt/live/asterix.gluino.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/asterix.gluino.com/privkey.pem;

    # Proxy to ASTERIX Monitor
    location / {
        proxy_pass http://127.0.0.1:8324;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket upgrade for /ws
    location /ws {
        proxy_pass http://127.0.0.1:8324/ws;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }
}
