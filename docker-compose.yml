services:
  monitor:
    build: .
    ports:
      - "${WEB_PORT:-8080}:${WEB_PORT:-8080}"
      - "${ASTERIX_UDP_PORT:-23401}:${ASTERIX_UDP_PORT:-23401}/udp"
      - "${COT_UDP_PORT:-6969}:${COT_UDP_PORT:-6969}/udp"
      - "${COT_TCP_PORT:-8087}:${COT_TCP_PORT:-8087}/tcp"
      - "${GMTI_UDP_PORT:-7607}:${GMTI_UDP_PORT:-7607}/udp"
    volumes:
      - ./config:/etc/sigmon
    environment:
      - WEB_PORT=${WEB_PORT:-8080}
      - SIGMON_CONFIG_DIR=/etc/sigmon
