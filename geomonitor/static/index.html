<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signal Monitor</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="">
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');

/* Dark theme (default) — WV brand */
:root, [data-theme="dark"] {
  --bg: #3A4251;
  --bg-secondary: #2f3640;
  --bg-tertiary: #353d49;
  --bg-hover: #434d5c;
  --bg-selected: #4e5a6c;
  --border: #556070;
  --text: #e4e8ee;
  --text-dim: #8a94a6;
  --text-bright: #ffffff;
  --accent: #0077FD;
  --accent-dim: #B2CBE7;
  --green: #34C759;
  --yellow: #FF9F0A;
  --red: #FF2F00;
  --orange: #FF9F0A;
  --pink: #FF375F;
  --teal: #B2CBE7;
  --mono: "SF Mono", "Cascadia Code", "Fira Code", Consolas, "Courier New", monospace;
  --sans: 'Inter', 'Helvetica Neue', Arial, sans-serif;
}

/* Light theme — WV brand */
[data-theme="light"] {
  --bg: #f4f6f9;
  --bg-secondary: #ffffff;
  --bg-tertiary: #ebeef3;
  --bg-hover: #dce1ea;
  --bg-selected: #B2CBE7;
  --border: #c4cdd9;
  --text: #3A4251;
  --text-dim: #6b7689;
  --text-bright: #3A4251;
  --accent: #0077FD;
  --accent-dim: #024497;
  --green: #34C759;
  --yellow: #FF9F0A;
  --red: #FF2F00;
  --orange: #FF9F0A;
  --pink: #FF375F;
  --teal: #024497;
}

/* Follow system preference when no explicit theme is set */
@media (prefers-color-scheme: light) {
  :root:not([data-theme]) {
    --bg: #f4f6f9;
    --bg-secondary: #ffffff;
    --bg-tertiary: #ebeef3;
    --bg-hover: #dce1ea;
    --bg-selected: #B2CBE7;
    --border: #c4cdd9;
    --text: #3A4251;
    --text-dim: #6b7689;
    --text-bright: #3A4251;
    --accent: #0077FD;
    --accent-dim: #024497;
    --green: #34C759;
    --yellow: #FF9F0A;
    --red: #FF2F00;
    --orange: #FF9F0A;
    --pink: #FF375F;
    --teal: #024497;
  }
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 13px;
  overflow: hidden;
}

/* Layout */
#app {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

/* Header */
#header {
  display: flex;
  align-items: center;
  gap: 16px;
  padding: 8px 16px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

#wv-logo {
  color: var(--accent);
  flex-shrink: 0;
}

#header h1 {
  font-size: 15px;
  font-weight: 500;
  color: var(--text-bright);
  white-space: nowrap;
  letter-spacing: 0.3px;
}

.header-btn {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 3px 10px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  user-select: none;
  border: 1px solid transparent;
}

.header-btn:hover { border-color: var(--border); }

.header-btn.active {
  background: rgba(52, 199, 89, 0.15);
  color: var(--green);
}

.header-btn.inactive {
  background: rgba(255, 159, 10, 0.15);
  color: var(--yellow);
}

.header-btn .dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: currentColor;
}

.header-btn.active .dot { animation: pulse 1.5s ease-in-out infinite; }

.header-btn .icon { font-size: 14px; line-height: 1; }

.kbd-hint {
  font-size: 10px;
  color: var(--text-dim);
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 3px;
  padding: 0 4px;
  margin-left: 2px;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.3; }
}

#stats {
  display: flex;
  gap: 16px;
  margin-left: auto;
  font-size: 12px;
  color: var(--text-dim);
}

#stats span { white-space: nowrap; }
#stats .val { color: var(--text); font-weight: 500; }

/* Filter bar */
#filters {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 6px 16px;
  background: var(--bg-tertiary);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  flex-wrap: wrap;
}

#filters label {
  font-size: 11px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

#filters select, #filters input {
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 4px 8px;
  font-size: 12px;
  font-family: var(--mono);
  outline: none;
}

#filters select:focus, #filters input:focus {
  border-color: var(--accent);
}

#filters input[type="text"] { width: 180px; }
#filters input[type="datetime-local"] { width: 170px; }

.filter-group {
  display: flex;
  align-items: center;
  gap: 4px;
}

#clear-filters {
  background: transparent;
  color: var(--text-dim);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 4px 8px;
  font-size: 11px;
  cursor: pointer;
}

#clear-filters:hover { color: var(--text); border-color: var(--text-dim); }

/* Main content area — three panes */
#content {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 0;
}

/* Message list (top pane) */
#message-list-container {
  flex: 1;
  min-height: 120px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  border-bottom: 2px solid var(--border);
}

#message-list-header {
  display: grid;
  grid-template-columns: 60px 100px 160px 50px 1fr 50px;
  gap: 0;
  padding: 4px 12px;
  background: var(--bg-tertiary);
  border-bottom: 1px solid var(--border);
  font-size: 11px;
  font-weight: 600;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  flex-shrink: 0;
}

#message-list-header .col-header {
  cursor: pointer;
  user-select: none;
  display: flex;
  align-items: center;
  gap: 3px;
}

#message-list-header .col-header:hover { color: var(--text); }
#message-list-header .col-header.sorted { color: var(--accent); }

.sort-arrow {
  font-size: 9px;
  opacity: 0;
}

.col-header:hover .sort-arrow { opacity: 0.4; }
.col-header.sorted .sort-arrow { opacity: 1; }

#message-list {
  flex: 1;
  overflow-y: auto;
  font-family: var(--mono);
  font-size: 12px;
}

.msg-row {
  display: grid;
  grid-template-columns: 60px 100px 160px 50px 1fr 50px;
  gap: 0;
  padding: 2px 12px;
  cursor: pointer;
  border-bottom: 1px solid transparent;
}

.msg-row:hover { background: var(--bg-hover); }
.msg-row.selected { background: var(--bg-selected); border-bottom-color: var(--border); }

.msg-row .col-seq { color: var(--text-dim); }
.msg-row .col-time { color: var(--teal); }
.msg-row .col-ip { color: var(--text); }
.msg-row .col-cat { color: var(--yellow); font-weight: 600; }
.msg-row .col-summary { color: var(--text); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.msg-row .col-size { color: var(--text-dim); text-align: right; }
.msg-row.parse-error .col-summary { color: var(--red); }

/* Detail panes (bottom) */
#detail-panes {
  height: 280px;
  min-height: 100px;
  display: flex;
  flex-shrink: 0;
}

/* Resize handle */
#resize-handle {
  height: 4px;
  background: var(--border);
  cursor: ns-resize;
  flex-shrink: 0;
}

#resize-handle:hover { background: var(--accent); }

/* Decoded tree (left) */
#decoded-tree {
  flex: 1;
  overflow: auto;
  padding: 8px 12px;
  font-family: var(--mono);
  font-size: 12px;
  border-right: 1px solid var(--border);
  background: var(--bg-secondary);
}

#decoded-tree .tree-empty {
  color: var(--text-dim);
  font-style: italic;
  padding: 20px 0;
}

.tree-node { padding-left: 16px; }

.tree-toggle {
  cursor: pointer;
  user-select: none;
  padding: 1px 0;
  display: flex;
  align-items: baseline;
  gap: 4px;
}

.tree-toggle:hover { color: var(--accent); }

.tree-arrow {
  display: inline-block;
  width: 12px;
  font-size: 10px;
  color: var(--text-dim);
  flex-shrink: 0;
}

.tree-key { color: var(--accent); }
.tree-desc { color: var(--text-dim); font-size: 11px; }
.tree-val { color: var(--green); }
.tree-meaning { color: var(--orange); font-size: 11px; }
.tree-category-label { color: var(--yellow); font-weight: 600; }
.tree-error { color: var(--red); }

.tree-children { display: none; }
.tree-children.open { display: block; }

.tree-leaf {
  padding: 1px 0 1px 16px;
  display: flex;
  gap: 8px;
  align-items: baseline;
  flex-wrap: wrap;
}

/* Hex dump (right) */
#hex-dump {
  flex: 1;
  overflow: auto;
  padding: 8px 12px;
  font-family: var(--mono);
  font-size: 12px;
  background: var(--bg-secondary);
  white-space: pre;
  line-height: 1.5;
}

#hex-dump .hex-empty {
  color: var(--text-dim);
  font-style: italic;
}

.hex-offset { color: var(--text-dim); }
.hex-byte { color: var(--text); }
.hex-ascii { color: var(--teal); }
.hex-separator { color: var(--border); }

/* Connection status overlay */
#connection-status {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 24px 32px;
  text-align: center;
  z-index: 100;
  display: none;
}

#connection-status.visible { display: block; }
#connection-status h2 { font-size: 16px; margin-bottom: 8px; }
#connection-status p { color: var(--text-dim); font-size: 13px; }

/* Map panel */
#map-container {
  display: none;
  height: 40vh;
  min-height: 200px;
  border-bottom: 2px solid var(--border);
  flex-shrink: 0;
  position: relative;
  z-index: 1;
  isolation: isolate;
}

#map-container.visible { display: block; }

#map {
  width: 100%;
  height: 100%;
}

/* Override Leaflet for dark theme */
.leaflet-container { background: var(--bg); }

#map-resize-handle {
  height: 4px;
  background: var(--border);
  cursor: ns-resize;
  flex-shrink: 0;
  display: none;
}

#map-resize-handle.visible { display: block; }

/* Map legend */
#map-legend {
  position: absolute;
  bottom: 10px;
  left: 10px;
  z-index: 1000;
  background: var(--bg-secondary);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 8px 12px;
  font-size: 11px;
  color: var(--text);
  max-width: 200px;
}

#map-legend .legend-item {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 2px 0;
}

#map-legend .legend-dot {
  width: 10px;
  height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

#map-legend .legend-line {
  width: 16px;
  height: 3px;
  border-radius: 2px;
  flex-shrink: 0;
}

/* Settings panel */
#settings-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.4);
  z-index: 200;
}
#settings-overlay.open { display: block; }

#settings-panel {
  position: fixed;
  top: 0; right: -420px;
  width: 400px; height: 100vh;
  background: var(--bg-secondary);
  border-left: 1px solid var(--border);
  z-index: 201;
  display: flex;
  flex-direction: column;
  transition: right 0.25s ease;
  box-shadow: -4px 0 20px rgba(0,0,0,0.3);
}
#settings-panel.open { right: 0; }

#settings-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
#settings-header h2 {
  font-size: 16px;
  font-weight: 500;
  color: var(--text-bright);
}
#settings-close {
  background: none;
  border: none;
  color: var(--text-dim);
  font-size: 22px;
  cursor: pointer;
  padding: 0 4px;
}
#settings-close:hover { color: var(--text); }

#settings-body {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
}

.settings-section {
  margin-bottom: 20px;
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}

.settings-section-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  background: var(--bg-tertiary);
  cursor: pointer;
  user-select: none;
}
.settings-section-header:hover { background: var(--bg-hover); }

.settings-section-title {
  font-size: 13px;
  font-weight: 500;
  color: var(--text-bright);
  display: flex;
  align-items: center;
  gap: 8px;
}

.settings-plugin-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

.settings-section-status {
  font-size: 11px;
  padding: 2px 8px;
  border-radius: 10px;
}
.settings-section-status.running { background: rgba(52,199,89,0.15); color: var(--green); }
.settings-section-status.stopped { background: rgba(255,47,0,0.15); color: var(--red); }
.settings-section-status.disabled { background: rgba(138,148,166,0.15); color: var(--text-dim); }

.settings-section-body {
  padding: 12px 14px;
  display: flex;
  flex-direction: column;
  gap: 10px;
}

.settings-field {
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.settings-field label {
  font-size: 11px;
  font-weight: 500;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
.settings-field input, .settings-field select {
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 6px 8px;
  font-size: 13px;
  font-family: var(--mono);
  outline: none;
}
.settings-field input:focus, .settings-field select:focus { border-color: var(--accent); }
.settings-field .field-desc {
  font-size: 10px;
  color: var(--text-dim);
}

.settings-actions {
  display: flex;
  gap: 6px;
  padding-top: 6px;
}

.settings-btn {
  padding: 5px 12px;
  border-radius: 4px;
  font-size: 12px;
  font-weight: 500;
  cursor: pointer;
  border: 1px solid var(--border);
  background: var(--bg-tertiary);
  color: var(--text);
}
.settings-btn:hover { background: var(--bg-hover); }
.settings-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); }
.settings-btn.primary:hover { opacity: 0.9; }
.settings-btn.danger { color: var(--red); }
.settings-btn.danger:hover { background: rgba(255,47,0,0.1); }

.settings-toggle-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.settings-switch {
  position: relative;
  width: 36px; height: 20px;
  cursor: pointer;
}
.settings-switch input { display: none; }
.settings-switch .slider {
  position: absolute;
  inset: 0;
  background: var(--border);
  border-radius: 10px;
  transition: background 0.2s;
}
.settings-switch .slider::after {
  content: "";
  position: absolute;
  width: 16px; height: 16px;
  border-radius: 50%;
  background: #fff;
  top: 2px; left: 2px;
  transition: transform 0.2s;
}
.settings-switch input:checked + .slider { background: var(--green); }
.settings-switch input:checked + .slider::after { transform: translateX(16px); }

/* Scrollbar styling */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }
</style>
</head>
<body>
<div id="app">
  <!-- Header -->
  <div id="header">
    <svg id="wv-logo" width="32" height="18" viewBox="0 0 313 177" xmlns="http://www.w3.org/2000/svg"><g stroke="none" fill="none" fill-rule="evenodd"><polygon fill="currentColor" points="171 0 213 0 242 103 271 0 313 0 263 177 221 177"/><path d="M0,0 L50,177 C78,177 92,177 92,177 L121,74 L150,177 L192,177 L142,0 L100,0 L71.0033337,103 L42,0 L0,0 Z" fill="currentColor"/></g></svg>
    <h1>Signal Monitor</h1>
    <div class="header-btn active" id="play-toggle" title="Pause/resume incoming messages (Space)">
      <span class="dot"></span>
      <span class="icon" id="play-icon">&#9654;</span>
      <span id="play-label">Live</span>
    </div>
    <div class="header-btn active" id="tail-toggle" title="Auto-scroll to latest messages">
      <span class="icon" id="tail-icon">&#8615;</span>
      <span id="tail-label">Tail</span>
    </div>
    <div class="header-btn" id="map-toggle" title="Toggle map view (M)">
      <span class="icon" id="map-icon">&#9678;</span>
      <span>Map</span>
    </div>
    <div class="header-btn" id="clear-all-btn" title="Clear all messages and tracks">
      <span class="icon">&#10005;</span>
      <span>Clear</span>
    </div>
    <div class="header-btn" id="settings-toggle" title="Settings (S)">
      <span class="icon">&#9881;</span>
      <span>Settings</span>
    </div>
    <div class="header-btn" id="theme-toggle" title="Toggle dark/light theme">
      <span class="icon" id="theme-icon">&#9790;</span>
    </div>
    <div id="stats">
      <span>Rate: <span class="val" id="stat-rate">0</span>/s</span>
      <span>Msgs: <span class="val" id="stat-buffer">0</span></span>
      <span>Tracks: <span class="val" id="stat-tracks">0</span></span>
      <span>Clients: <span class="val" id="stat-clients">0</span></span>
    </div>
  </div>

  <!-- Filter bar -->
  <div id="filters">
    <div class="filter-group">
      <label>Cat</label>
      <select id="filter-cat"><option value="">All</option></select>
    </div>
    <div class="filter-group">
      <label>Source</label>
      <select id="filter-ip"><option value="">All</option></select>
    </div>
    <div class="filter-group">
      <label>From</label>
      <input type="datetime-local" id="filter-from" step="1">
    </div>
    <div class="filter-group">
      <label>To</label>
      <input type="datetime-local" id="filter-to" step="1">
    </div>
    <div class="filter-group">
      <label>Search</label>
      <input type="text" id="filter-search" placeholder="text or hex...">
    </div>
    <button id="clear-filters">Clear</button>
  </div>

  <!-- Main content -->
  <div id="content">
    <!-- Map -->
    <div id="map-container">
      <div id="map"></div>
    </div>
    <div id="map-resize-handle"></div>
    <!-- Message list -->
    <div id="message-list-container">
      <div id="message-list-header">
        <div class="col-header sorted" data-sort="seq">#<span class="sort-arrow">&#9650;</span></div>
        <div class="col-header" data-sort="ts">Time<span class="sort-arrow">&#9650;</span></div>
        <div class="col-header" data-sort="src_ip">Source<span class="sort-arrow">&#9650;</span></div>
        <div class="col-header" data-sort="cat">Cat<span class="sort-arrow">&#9650;</span></div>
        <div class="col-header" data-sort="summary">Summary<span class="sort-arrow">&#9650;</span></div>
        <div class="col-header" data-sort="size" style="text-align:right">Size<span class="sort-arrow">&#9650;</span></div>
      </div>
      <div id="message-list"></div>
    </div>

    <!-- Resize handle -->
    <div id="resize-handle"></div>

    <!-- Detail panes -->
    <div id="detail-panes">
      <div id="decoded-tree"><div class="tree-empty">Select a message to view decoded fields</div></div>
      <div id="hex-dump"><span class="hex-empty">Select a message to view hex dump</span></div>
    </div>
  </div>
</div>

<!-- Settings panel (slide-out) -->
<div id="settings-panel">
  <div id="settings-header">
    <h2>Settings</h2>
    <button id="settings-close">&times;</button>
  </div>
  <div id="settings-body">
    <div id="settings-content"></div>
  </div>
</div>
<div id="settings-overlay"></div>

<!-- Connection overlay -->
<div id="connection-status">
  <h2>Connecting...</h2>
  <p>Establishing WebSocket connection to server</p>
</div>

<script>
(function() {
"use strict";

// -----------------------------------------------------------------------
// State
// -----------------------------------------------------------------------
// -----------------------------------------------------------------------
// Client-side ring buffer + RAF render queue
// -----------------------------------------------------------------------
const MAX_MESSAGES_DEFAULT = 5000;
const MAX_MESSAGES_KEY = "geomonitor_max_messages";
let _cachedMaxMessages = null;

function getMaxMessages() {
  if (_cachedMaxMessages == null) {
    const v = parseInt(localStorage.getItem(MAX_MESSAGES_KEY));
    _cachedMaxMessages = (v && v > 0) ? v : MAX_MESSAGES_DEFAULT;
  }
  return _cachedMaxMessages;
}

function setMaxMessages(n) {
  _cachedMaxMessages = Math.max(100, Math.min(100000, n));
  localStorage.setItem(MAX_MESSAGES_KEY, _cachedMaxMessages);
  // Resize the ring buffer
  ring.resize(_cachedMaxMessages);
  state.renderDirty = true;
  return _cachedMaxMessages;
}

// -----------------------------------------------------------------------
// O(1) circular buffer — no Array.splice, no index shifting
// -----------------------------------------------------------------------
class RingBuffer {
  constructor(capacity) {
    this._buf = new Array(capacity);
    this._cap = capacity;
    this._head = 0;  // index of oldest element
    this._size = 0;
  }

  get length() { return this._size; }
  get capacity() { return this._cap; }

  push(item) {
    const idx = (this._head + this._size) % this._cap;
    this._buf[idx] = item;
    if (this._size < this._cap) {
      this._size++;
    } else {
      // Overwrite oldest — advance head
      this._head = (this._head + 1) % this._cap;
    }
  }

  // Get element at logical index (0 = oldest)
  get(i) {
    if (i < 0 || i >= this._size) return undefined;
    return this._buf[(this._head + i) % this._cap];
  }

  // Iterate all elements oldest-first
  forEach(fn) {
    for (let i = 0; i < this._size; i++) {
      fn(this._buf[(this._head + i) % this._cap], i);
    }
  }

  clear() {
    this._head = 0;
    this._size = 0;
  }

  resize(newCap) {
    const items = [];
    this.forEach(item => items.push(item));
    this._cap = newCap;
    this._buf = new Array(newCap);
    this._head = 0;
    // Keep only the newest items if shrinking
    const start = Math.max(0, items.length - newCap);
    this._size = 0;
    for (let i = start; i < items.length; i++) {
      this.push(items[i]);
    }
  }
}

// -----------------------------------------------------------------------
// URL hash state
// -----------------------------------------------------------------------
function readHash() {
  const h = window.location.hash.substring(1);
  const params = new URLSearchParams(h);
  if (params.get("cat")) filterCat.value = params.get("cat");
  if (params.get("ip")) filterIP.value = params.get("ip");
  if (params.get("from")) filterFrom.value = params.get("from");
  if (params.get("to")) filterTo.value = params.get("to");
  if (params.get("q")) filterSearch.value = params.get("q");
}

function writeHash() {
  const params = new URLSearchParams();
  if (filterCat.value) params.set("cat", filterCat.value);
  if (filterIP.value) params.set("ip", filterIP.value);
  if (filterFrom.value) params.set("from", filterFrom.value);
  if (filterTo.value) params.set("to", filterTo.value);
  if (filterSearch.value) params.set("q", filterSearch.value);
  const h = params.toString();
  history.replaceState(null, "", h ? "#" + h : window.location.pathname);
}

// -----------------------------------------------------------------------
// Message summary
// -----------------------------------------------------------------------
function messageSummary(msg) {
  // New model: summary comes from server
  if (msg.summary && msg.summary !== "") return msg.summary;
  if (msg.decode_error) return "DECODE ERROR: " + msg.decode_error;
  // Legacy fallback
  if (msg.parse_error) return "PARSE ERROR: " + msg.parse_error;
  if (msg.parsed) {
    const parts = [];
    for (const block of (Array.isArray(msg.parsed) ? msg.parsed : [msg.parsed])) {
      const cat = block.category || "?";
      let info = "Cat " + cat;
      if (block.I240 && block.I240.TId) info += " " + block.I240.TId.val.trim();
      else if (block.I161 && block.I161.Tn) info += " Trk#" + block.I161.Tn.val;
      if (block.I000 && block.I000.MsgTyp) info += " " + (block.I000.MsgTyp.meaning || "");
      parts.push(info);
    }
    return parts.join(" | ");
  }
  return "(empty)";
}

function messagePlugin(msg) {
  return msg.plugin_id || "unknown";
}

function messageCategories(msg) {
  // New model: use meta.category or plugin_id
  if (msg.meta && msg.meta.category != null) {
    const cat = msg.meta.category;
    return Array.isArray(cat) ? cat : [cat];
  }
  if (msg.plugin_id) return [msg.plugin_id];
  // Legacy
  if (msg.parsed) return (Array.isArray(msg.parsed) ? msg.parsed : []).map(b => b.category).filter(c => c != null);
  return [];
}

// -----------------------------------------------------------------------
// Filtering
// -----------------------------------------------------------------------
function _getFilterCache() {
  if (_filterCache) return _filterCache;
  const catVal = filterCat.value;
  const searchRaw = filterSearch.value;
  const fromRaw = filterFrom.value;
  const toRaw = filterTo.value;
  _filterCache = {
    catVal,
    catNum: catVal ? parseInt(catVal) : NaN,
    ipVal: filterIP.value,
    fromTs: fromRaw ? new Date(fromRaw).getTime() / 1000 : 0,
    toTs: toRaw ? new Date(toRaw).getTime() / 1000 : 0,
    q: searchRaw ? searchRaw.toLowerCase() : "",
  };
  return _filterCache;
}

function matchesFilter(msg) {
  const f = _getFilterCache();

  // Category filter
  if (f.catVal) {
    const cats = messageCategories(msg);
    const match = isNaN(f.catNum)
      ? (cats.includes(f.catVal) || msg.plugin_id === f.catVal)
      : cats.includes(f.catNum);
    if (!match) return false;
  }

  // IP filter
  if (f.ipVal && msg.src_ip !== f.ipVal) return false;

  // Time range
  if (f.fromTs && msg.ts < f.fromTs) return false;
  if (f.toTs && msg.ts > f.toTs) return false;

  // Text search
  if (f.q) {
    const summary = messageSummary(msg).toLowerCase();
    const hex = (msg.raw_hex || "").toLowerCase();
    if (!summary.includes(f.q) && !hex.includes(f.q) && !msg.src_ip.includes(f.q)) return false;
  }

  return true;
}

function rebuildFiltered() {
  _filterCache = null; // invalidate cached filter values
  state.filtered = [];
  for (let i = 0; i < ring.length; i++) {
    if (matchesFilter(ring.get(i))) {
      state.filtered.push(i);
    }
  }
  applySorting();
}

// -----------------------------------------------------------------------
// Sorting
// -----------------------------------------------------------------------
function getSortValue(msg, col) {
  switch (col) {
    case "seq": return msg.seq;
    case "ts": return msg.ts;
    case "src_ip": return msg.src_ip + ":" + msg.src_port;
    case "cat": {
      const cats = messageCategories(msg);
      return cats.length > 0 ? cats[0] : 0;
    }
    case "summary": return messageSummary(msg);
    case "size": return msg.size;
    default: return msg.seq;
  }
}

function applySorting() {
  const col = state.sortCol;
  const asc = state.sortAsc;

  state.filtered.sort((ai, bi) => {
    const a = getSortValue(ring.get(ai), col);
    const b = getSortValue(ring.get(bi), col);
    let cmp;
    if (typeof a === "string" && typeof b === "string") {
      cmp = a.localeCompare(b);
    } else {
      cmp = (a < b) ? -1 : (a > b) ? 1 : 0;
    }
    return asc ? cmp : -cmp;
  });
}

function setSort(col) {
  if (state.sortCol === col) {
    state.sortAsc = !state.sortAsc;
  } else {
    state.sortCol = col;
    state.sortAsc = true;
  }
  updateSortHeaders();
  rebuildFiltered();
  renderFullList();
}

function updateSortHeaders() {
  document.querySelectorAll("#message-list-header .col-header").forEach(el => {
    const col = el.dataset.sort;
    const arrow = el.querySelector(".sort-arrow");
    if (col === state.sortCol) {
      el.classList.add("sorted");
      arrow.innerHTML = state.sortAsc ? "&#9650;" : "&#9660;";
    } else {
      el.classList.remove("sorted");
      arrow.innerHTML = "&#9650;";
    }
  });
}

function formatTime(ts) {
  const d = new Date(ts * 1000);
  return d.toLocaleTimeString("en-GB", { hour12: false }) +
    "." + String(d.getMilliseconds()).padStart(3, "0");
}

// -----------------------------------------------------------------------
// Simple DOM list — append new rows, trim old ones. No virtual list.
// At ~50 msg/s with 5000 max DOM rows, this is fast enough.
// -----------------------------------------------------------------------
const MAX_DOM_ROWS = 2000; // keep DOM manageable
let _listInitialized = false;
let _suppressScrollEvent = false; // suppress during programmatic scroll

function _initList() {
  if (_listInitialized) return;
  _listInitialized = true;
  msgList.innerHTML = "";
  // Delegated click handler
  msgList.addEventListener("click", (e) => {
    const row = e.target.closest(".msg-row");
    if (row) {
      state.autoScroll = false;
      updateTailButton();
      selectMessage(parseInt(row.dataset.seq));
    }
  });
}

function createMsgRow(msg) {
  const row = document.createElement("div");
  const hasError = msg.decode_error || msg.parse_error;
  row.className = "msg-row" + (hasError ? " parse-error" : "");
  row.dataset.seq = msg.seq;
  const cats = messageCategories(msg);
  const plugin = messagePlugin(msg);
  const catStr = cats.length > 0 ? cats.join(",") : plugin;
  const summary = messageSummary(msg);
  row.innerHTML =
    '<div class="col-seq">' + msg.seq + '</div>' +
    '<div class="col-time">' + formatTime(msg.ts) + '</div>' +
    '<div class="col-ip">' + msg.src_ip + ':' + msg.src_port + '</div>' +
    '<div class="col-cat">' + catStr + '</div>' +
    '<div class="col-summary" title="' + escapeHtml(summary) + '">' + escapeHtml(summary) + '</div>' +
    '<div class="col-size">' + msg.size + '</div>';
  return row;
}

function renderFullList() {
  _initList();
  msgList.innerHTML = "";
  const frag = document.createDocumentFragment();
  // Only render the last MAX_DOM_ROWS filtered messages
  const start = Math.max(0, state.filtered.length - MAX_DOM_ROWS);
  for (let i = start; i < state.filtered.length; i++) {
    const msg = ring.get(state.filtered[i]);
    if (msg) frag.appendChild(createMsgRow(msg));
  }
  msgList.appendChild(frag);
  if (state.autoScroll && !state.paused) {
    _suppressScrollEvent = true;
    msgList.scrollTop = msgList.scrollHeight;
    _suppressScrollEvent = false;
  }
}

function appendNewRows(startFilterIdx) {
  _initList();
  const frag = document.createDocumentFragment();
  for (let i = startFilterIdx; i < state.filtered.length; i++) {
    const msg = ring.get(state.filtered[i]);
    if (msg) frag.appendChild(createMsgRow(msg));
  }
  if (frag.childNodes.length === 0) return;

  // Trim old rows from the top if over limit
  const excess = (msgList.children.length + frag.childNodes.length) - MAX_DOM_ROWS;
  if (excess > 0) {
    for (let i = 0; i < excess && msgList.firstChild; i++) {
      msgList.removeChild(msgList.firstChild);
    }
  }

  msgList.appendChild(frag);

  if (state.autoScroll && !state.paused) {
    _suppressScrollEvent = true;
    msgList.scrollTop = msgList.scrollHeight;
    _suppressScrollEvent = false;
  }
}

function tailSnap() {
  if (!state.autoScroll) return;
  _suppressScrollEvent = true;
  msgList.scrollTop = msgList.scrollHeight;
  _suppressScrollEvent = false;
}

// -----------------------------------------------------------------------
// Rendering — decoded tree
// -----------------------------------------------------------------------
function renderDecodedTree(msg) {
  if (!msg) {
    decodedTree.innerHTML = '<div class="tree-empty">Select a message to view decoded fields</div>';
    return;
  }

  const error = msg.decode_error || msg.parse_error;
  if (error) {
    decodedTree.innerHTML = '<div class="tree-error">Decode error: ' + escapeHtml(error) + '</div>';
    return;
  }

  // Support both new (decoded) and legacy (parsed) field names
  const data = msg.decoded || msg.parsed;
  if (!data || (Array.isArray(data) && data.length === 0)) {
    decodedTree.innerHTML = '<div class="tree-empty">No decoded data</div>';
    return;
  }

  let html = "";
  const blocks = Array.isArray(data) ? data : [data];
  for (const block of blocks) {
    // ASTERIX blocks have "category" → use renderBlock
    // Other plugins produce generic dicts → render as generic tree
    if (block.category != null) {
      html += renderBlock(block);
    } else {
      html += renderGenericTree(block, msg.plugin_id || "");
    }
  }
  decodedTree.innerHTML = html;

  // Add click handlers for toggles
  decodedTree.querySelectorAll(".tree-toggle").forEach(el => {
    el.addEventListener("click", () => {
      const children = el.nextElementSibling;
      if (children && children.classList.contains("tree-children")) {
        children.classList.toggle("open");
        const arrow = el.querySelector(".tree-arrow");
        arrow.textContent = children.classList.contains("open") ? "\u25BC" : "\u25B6";
      }
    });
  });

  // Apply global expand/collapse state
  applyTreeExpandState();
}

function applyTreeExpandState() {
  if (state.treeExpanded) {
    decodedTree.querySelectorAll(".tree-children").forEach(el => el.classList.add("open"));
    decodedTree.querySelectorAll(".tree-arrow").forEach(el => el.textContent = "\u25BC");
  } else {
    // Collapse all except the top-level node (first .tree-children stays open)
    const allChildren = decodedTree.querySelectorAll(".tree-children");
    const allArrows = decodedTree.querySelectorAll(".tree-arrow");
    allChildren.forEach((el, i) => {
      if (i === 0) {
        el.classList.add("open");
      } else {
        el.classList.remove("open");
      }
    });
    allArrows.forEach((el, i) => {
      el.textContent = (i === 0) ? "\u25BC" : "\u25B6";
    });
  }
}

function renderBlock(block) {

    8: "Monoradar Derived Weather",
    10: "Monosensor Surface Movement Data",
    19: "Multilateration System Status",

    62: "SDPS Track Messages",

  };

  let html = '<div class="tree-node">';

const DATA_ITEM_NAMES = {
  "I000": "Message Type",
  "I010": "Data Source Identifier",
  "I020": "Target Report Descriptor",
  "I030": "Warning/Error Conditions",
  "I040": "Measured Position (Polar)",
  "I042": "Calculated Position (Cartesian)",
  "I050": "System Configuration & Status",
  "I060": "System Processing Mode",
  "I070": "Mode-3/A Code",
  "I080": "Mode-3/A Code Confidence",
  "I090": "Flight Level",
  "I100": "Mode-C Code",
  "I110": "3D Height",
  "I120": "Radial Doppler Speed",
  "I130": "Radar Plot Characteristics",
  "I140": "Time of Day",
  "I161": "Track Number",
  "I170": "Track Status",
  "I200": "Calculated Track Velocity",
  "I210": "Track Quality",
  "I220": "Aircraft Address",
  "I230": "Communications / ACAS",
  "I240": "Aircraft Identification",
  "I250": "Mode S MB Data",
};

function renderDataItem(key, item) {
  const name = DATA_ITEM_NAMES[key] || "";

  // If item is an array (e.g., I250 or I030), render each element
  if (Array.isArray(item)) {
    let html = '<div class="tree-node">';
    html += '<div class="tree-toggle">';
    html += '<span class="tree-arrow">\u25B6</span>';
    html += '<span class="tree-key">' + key + '</span>';
    if (name) html += ' <span class="tree-desc">\u2014 ' + escapeHtml(name) + '</span>';
    html += ' <span class="tree-desc">[' + item.length + ' items]</span>';
    html += '</div>';
    html += '<div class="tree-children">';
    for (let i = 0; i < item.length; i++) {
      html += renderDataItem(key + "[" + i + "]", item[i]);
    }
    html += '</div></div>';
    return html;
  }

  // Object with sub-fields
  if (typeof item === "object" && item !== null) {
    const subKeys = Object.keys(item);
    // Check if it's a leaf (has 'val' directly)
    if (subKeys.includes("val") && subKeys.length <= 4) {
      return renderLeaf(key, name, item);
    }

    // It's a branch with sub-fields
    let html = '<div class="tree-node">';
    html += '<div class="tree-toggle">';
    html += '<span class="tree-arrow">\u25B6</span>';
    html += '<span class="tree-key">' + key + '</span>';
    if (name) html += ' <span class="tree-desc">\u2014 ' + escapeHtml(name) + '</span>';
    html += '</div>';
    html += '<div class="tree-children">';
    for (const sk of subKeys) {
      if (typeof item[sk] === "object" && item[sk] !== null) {
        html += renderLeaf(sk, "", item[sk]);
      } else {
        html += '<div class="tree-leaf">';
        html += '<span class="tree-key">' + sk + '</span>';
        html += '<span class="tree-val">' + escapeHtml(String(item[sk])) + '</span>';
        html += '</div>';
      }
    }
    html += '</div></div>';
    return html;
  }

  // Primitive
  return '<div class="tree-leaf"><span class="tree-key">' + key + '</span>' +
    '<span class="tree-val">' + escapeHtml(String(item)) + '</span></div>';
}

function renderLeaf(key, parentName, field) {
  let html = '<div class="tree-leaf">';
  html += '<span class="tree-key">' + key + '</span>';

  if (field.desc) html += ' <span class="tree-desc">(' + escapeHtml(field.desc) + ')</span>';
  if (field.val !== undefined) html += ' <span class="tree-val">' + escapeHtml(String(field.val)) + '</span>';
  if (field.meaning) html += ' <span class="tree-meaning">' + escapeHtml(field.meaning) + '</span>';
  if (field.max !== undefined) html += ' <span class="tree-desc">[max: ' + field.max + ']</span>';

  html += '</div>';
  return html;
}

// -----------------------------------------------------------------------
// Rendering — generic tree (for non-ASTERIX plugins)
// -----------------------------------------------------------------------
function renderGenericTree(data, pluginId) {
  let html = '<div class="tree-node">';
  html += '<div class="tree-toggle">';
  html += '<span class="tree-arrow">\u25BC</span>';
  html += '<span class="tree-category-label">' + escapeHtml(pluginId.toUpperCase()) + '</span>';
  html += '</div>';
  html += '<div class="tree-children open">';

  for (const key of Object.keys(data)) {
    const val = data[key];
    if (val === null || val === undefined) continue;

    if (typeof val === "object" && !Array.isArray(val)) {
      // Check if it's a leaf with val/desc/meaning
      if ("val" in val && Object.keys(val).length <= 4) {
        html += renderLeaf(key, "", val);
      } else {
        // Sub-section
        html += '<div class="tree-node">';
        html += '<div class="tree-toggle">';
        html += '<span class="tree-arrow">\u25B6</span>';
        html += '<span class="tree-key">' + escapeHtml(key) + '</span>';
        html += '</div>';
        html += '<div class="tree-children">';
        for (const sk of Object.keys(val)) {
          const sv = val[sk];
          if (sv === null || sv === undefined) continue;
          if (typeof sv === "object" && !Array.isArray(sv) && "val" in sv) {
            html += renderLeaf(sk, "", sv);
          } else if (typeof sv === "object" && !Array.isArray(sv)) {
            // Deeper nesting
            html += renderDataItem(sk, sv);
          } else {
            html += '<div class="tree-leaf">';
            html += '<span class="tree-key">' + escapeHtml(sk) + '</span>';
            html += ' <span class="tree-val">' + escapeHtml(String(sv)) + '</span>';
            html += '</div>';
          }
        }
        html += '</div></div>';
      }
    } else {
      html += '<div class="tree-leaf">';
      html += '<span class="tree-key">' + escapeHtml(key) + '</span>';
      html += ' <span class="tree-val">' + escapeHtml(String(val)) + '</span>';
      html += '</div>';
    }
  }

  html += '</div></div>';
  return html;
}

// -----------------------------------------------------------------------
// Rendering — hex dump
// -----------------------------------------------------------------------
function renderHexDump(msg) {
  if (!msg) {
    hexDump.innerHTML = '<span class="hex-empty">Select a message to view hex dump</span>';
    return;
  }

  const hex = msg.raw_hex;
  const bytes = [];
  for (let i = 0; i < hex.length; i += 2) {
    bytes.push(parseInt(hex.substr(i, 2), 16));
  }

  let html = "";
  for (let i = 0; i < bytes.length; i += 16) {
    const chunk = bytes.slice(i, i + 16);

    // Offset
    html += '<span class="hex-offset">' + i.toString(16).padStart(8, "0") + "</span>  ";

    // Hex bytes
    let hexPart = "";
    for (let j = 0; j < 16; j++) {
      if (j < chunk.length) {
        hexPart += '<span class="hex-byte">' + chunk[j].toString(16).padStart(2, "0") + "</span> ";
      } else {
        hexPart += "   ";
      }
      if (j === 7) hexPart += '<span class="hex-separator">\u2502</span> ';
    }
    html += hexPart;

    // ASCII
    html += '<span class="hex-separator">\u2502</span> <span class="hex-ascii">';
    for (let j = 0; j < chunk.length; j++) {
      const c = chunk[j];
      html += (c >= 32 && c < 127) ? escapeHtml(String.fromCharCode(c)) : ".";
    }
    html += "</span>\n";
  }

  hexDump.innerHTML = html;
}

// -----------------------------------------------------------------------
// Selection
// -----------------------------------------------------------------------
function selectMessage(seq) {
  state.selectedSeq = seq;

  // Update row highlight
  msgList.querySelectorAll(".msg-row.selected").forEach(r => r.classList.remove("selected"));
  const row = msgList.querySelector('.msg-row[data-seq="' + seq + '"]');
  if (row) {
    row.classList.add("selected");
    // Scroll into view if needed
    const listRect = msgList.getBoundingClientRect();
    const rowRect = row.getBoundingClientRect();
    if (rowRect.top < listRect.top || rowRect.bottom > listRect.bottom) {
      row.scrollIntoView({ block: "nearest" });
    }
  }

  // Find message by seq — use filtered index for fast lookup
  const filtIdx = _findFilteredIndexBySeq(seq);
  const msg = filtIdx >= 0 ? ring.get(state.filtered[filtIdx]) : null;
  renderDecodedTree(msg);
  renderHexDump(msg);
}

// Find the position in state.filtered for a given seq
function _findFilteredIndexBySeq(seq) {
  for (let i = 0; i < state.filtered.length; i++) {
    const msg = ring.get(state.filtered[i]);
    if (msg && msg.seq === seq) return i;
  }
  return -1;
}

// Navigate to adjacent message in the filtered list (data-driven, no DOM scan)
function getAdjacentSeq(direction) {
  if (state.filtered.length === 0) return null;

  if (state.selectedSeq === null) {
    const idx = direction > 0 ? 0 : state.filtered.length - 1;
    return ring.get(state.filtered[idx]).seq;
  }

  const curIdx = _findFilteredIndexBySeq(state.selectedSeq);
  if (curIdx < 0) return null;
  const next = curIdx + direction;
  if (next >= 0 && next < state.filtered.length) {
    return ring.get(state.filtered[next]).seq;
  }
  return null;
}

// -----------------------------------------------------------------------
// Keyboard navigation
// -----------------------------------------------------------------------
function handleKeyDown(e) {
  // Don't capture keys when focus is in an input/select
  const tag = document.activeElement.tagName;
  if (tag === "INPUT" || tag === "SELECT" || tag === "TEXTAREA") return;

  switch (e.key) {
    case "ArrowUp": {
      e.preventDefault();
      state.autoScroll = false;

      updateTailButton();
      const seq = getAdjacentSeq(-1);
      if (seq !== null) selectMessage(seq);
      break;
    }
    case "ArrowDown": {
      e.preventDefault();
      state.autoScroll = false;

      updateTailButton();
      const seq = getAdjacentSeq(1);
      if (seq !== null) selectMessage(seq);
      break;
    }
    case "ArrowRight": {
      e.preventDefault();
      state.treeExpanded = true;
      applyTreeExpandState();
      break;
    }
    case "ArrowLeft": {
      e.preventDefault();
      state.treeExpanded = false;
      applyTreeExpandState();
      break;
    }
    case " ": {
      // Space toggles pause
      e.preventDefault();
      togglePause();
      break;
    }
    case "m":
    case "M": {
      e.preventDefault();
      toggleMap();
      break;
    }
    case "s":
    case "S": {
      e.preventDefault();
      toggleSettings();
      break;
    }
    case "Escape": {
      if (settingsPanel.classList.contains("open")) {
        e.preventDefault();
        toggleSettings();
      }
      break;
    }
  }
}

// -----------------------------------------------------------------------
// Filter updates
// -----------------------------------------------------------------------
function updateFilterDropdowns(msg) {
  let catsChanged = false;
  let ipsChanged = false;

  // Add plugin_id as a "category" for filtering
  if (msg.plugin_id && !state.seenCats.has(msg.plugin_id)) {
    state.seenCats.add(msg.plugin_id);
    catsChanged = true;
  }
  for (const cat of messageCategories(msg)) {
    if (!state.seenCats.has(cat)) {
      state.seenCats.add(cat);
      catsChanged = true;
    }
  }
  if (!state.seenIPs.has(msg.src_ip)) {
    state.seenIPs.add(msg.src_ip);
    ipsChanged = true;
  }

  if (catsChanged) {
    const current = filterCat.value;
    const sorted = [...state.seenCats].sort((a, b) => a - b);
    filterCat.innerHTML = '<option value="">All</option>';
    for (const c of sorted) {
      const opt = document.createElement("option");
      opt.value = c;
      opt.textContent = "Cat " + c;
      filterCat.appendChild(opt);
    }
    filterCat.value = current;
  }

  if (ipsChanged) {
    const current = filterIP.value;
    const sorted = [...state.seenIPs].sort();
    filterIP.innerHTML = '<option value="">All</option>';
    for (const ip of sorted) {
      const opt = document.createElement("option");
      opt.value = ip;
      opt.textContent = ip;
      filterIP.appendChild(opt);
    }
    filterIP.value = current;
  }
}

function onFilterChange() {
  _filterCache = null;
  _mapFirstRender = true; // re-fit bounds on filter change
  writeHash();
  rebuildFiltered();
  renderFullList();
  rebuildMap();
}

// -----------------------------------------------------------------------
// WebSocket
// -----------------------------------------------------------------------
function connectWS() {
  const proto = location.protocol === "https:" ? "wss:" : "ws:";
  const url = proto + "//" + location.host + "/ws";

  connStatus.classList.add("visible");

  const ws = new WebSocket(url);
  state.ws = ws;

  ws.onopen = () => {
    connStatus.classList.remove("visible");
    console.log("WebSocket connected");
  };

  ws.onmessage = (event) => {
    const data = JSON.parse(event.data);

    if (data.type === "snapshot") {
      ring.clear();
      msgQueue.length = 0;
      if (data.plugins) state.plugins = data.plugins;
      if (data.tracks) state.tracks = data.tracks;
      rebuildFiltered();
      renderFullList();
      rebuildMap();
    } else if (data.type === "new") {
      // Queue messages — RAF loop will drain and render
      for (const msg of data.messages) {
        msgQueue.push(msg);
      }
      scheduleRaf();
    } else if (data.type === "tracks") {
      if (data.updates) {
        for (const key in data.updates) {
          state.tracks[key] = data.updates[key];
        }
        scheduleMapUpdate();
      }
    }
  };

  ws.onclose = () => {
    console.log("WebSocket closed, reconnecting in 2s...");
    connStatus.querySelector("h2").textContent = "Reconnecting...";
    connStatus.querySelector("p").textContent = "WebSocket connection lost. Retrying...";
    connStatus.classList.add("visible");
    state.reconnectTimer = setTimeout(connectWS, 2000);
  };

  ws.onerror = (err) => {
    console.error("WebSocket error:", err);
    ws.close();
  };
}

// -----------------------------------------------------------------------
// RAF render loop — drains msgQueue at display refresh rate
// -----------------------------------------------------------------------
function scheduleRaf() {
  if (!rafId) rafId = requestAnimationFrame(drainQueue);
}

function drainQueue() {
  rafId = null;
  if (msgQueue.length === 0 && !state.renderDirty) return;

  // 1. Move queued messages into ring buffer
  const batch = msgQueue.splice(0, msgQueue.length);
  const prevSize = ring.length;
  const wasFull = prevSize >= ring.capacity;
  for (const msg of batch) {
    ring.push(msg);
    updateFilterDropdowns(msg);
  }
  // How many items were evicted (overwritten by wraparound)?
  const evicted = wasFull ? batch.length : Math.max(0, (prevSize + batch.length) - ring.capacity);

  // 2. Update filtered index
  const _prevFilteredLen = state.filtered.length;
  if (state.renderDirty || state.sortCol !== "seq" || !state.sortAsc) {
    state.renderDirty = false;
    rebuildFiltered();
  } else if (!state.paused && batch.length > 0) {
    // Fast path: adjust indices for eviction, then filter new messages only
    if (evicted > 0) {
      // Shift existing filtered indices down and drop negatives
      let write = 0;
      for (let r = 0; r < state.filtered.length; r++) {
        const shifted = state.filtered[r] - evicted;
        if (shifted >= 0) {
          state.filtered[write++] = shifted;
        }
      }
      state.filtered.length = write;
    }
    // Filter only the newly added messages
    const base = ring.length - batch.length;
    for (let i = Math.max(0, base); i < ring.length; i++) {
      if (matchesFilter(ring.get(i))) {
        state.filtered.push(i);
      }
    }
  }

  // 4. Render — _prevFilteredLen was captured before step 2
  if (evicted > 0 || state.sortCol !== "seq" || !state.sortAsc || !_listInitialized) {
    // Full rebuild needed (eviction, non-default sort, first render)
    renderFullList();
  } else if (!state.paused && batch.length > 0) {
    // Fast path: just append the newly filtered messages
    appendNewRows(Math.max(0, _prevFilteredLen));
  }
}

let mapTrackLayers = {};     // key: trackNum → { polyline, marker }
let mapSensorPositions = {}; // key: "SAC:SIC" → { lat, lon, height }

const TILE_URLS = {
  dark: "https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png",
  light: "https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png",
};

// Track colors — deterministic by track number
// WV brand data viz colors: Red-Orange, Blue, Green, Orange, Pink, Dark Blue
const TRACK_COLORS = [
  "#FF2F00", "#0077FD", "#34C759", "#FF9F0A", "#FF375F", "#024497",
  "#FF6B3D", "#3399FF", "#5DD97B", "#FFB83D", "#FF6B8A", "#336BB5",
];

function trackColor(tn) {

}

// Convert polar (range NM, azimuth deg) relative to sensor → lat/lon
function polarToLatLon(sensorLat, sensorLon, rhoNM, thetaDeg) {
  const rangeM = rhoNM * 1852.0;
  const azRad = thetaDeg * Math.PI / 180.0;
  const latRad = sensorLat * Math.PI / 180.0;
  // Flat-earth approximation — good for < 200km
  const dLat = (rangeM * Math.cos(azRad)) / 111320.0;
  const dLon = (rangeM * Math.sin(azRad)) / (111320.0 * Math.cos(latRad));
  return [sensorLat + dLat, sensorLon + dLon];
}

// Diff-based map update — only add/remove/move what changed
let _mapFirstRender = true;

function _buildTrackTooltip(entity) {
  let tip = entity.label || "";
  if (entity.entity_type === "sensor") {
    if (entity.alt_m != null) tip += "<br>Alt: " + entity.alt_m.toFixed(0) + "m";
  } else {
    if (entity.alt_m != null) tip += "<br>Alt: " + (entity.alt_m * 3.28084).toFixed(0) + " ft";
    if (entity.speed_mps != null) tip += "<br>Spd: " + (entity.speed_mps / 0.514444).toFixed(0) + " kn";
    if (entity.heading_deg != null) tip += "<br>Hdg: " + entity.heading_deg.toFixed(0) + "\u00B0";
  }
  for (const pk in (entity.properties || {})) {
    if (entity.properties[pk]) tip += "<br>" + pk + ": " + entity.properties[pk];
  }
  return tip;
}

function _trackPassesFilter(entity, catVal, catNum, searchVal) {
  if (catVal) {
    const plugin = entity.source_plugin || "";
    if (isNaN(catNum)) {
      if (plugin !== catVal) return false;
    } else {
      if (plugin !== "asterix") return false;
    }
  }
  if (searchVal) {
    const label = (entity.label || "").toLowerCase();
    const id = (entity.entity_id || "").toLowerCase();
    if (!label.includes(searchVal) && !id.includes(searchVal)) {
      const props = JSON.stringify(entity.properties || {}).toLowerCase();
      if (!props.includes(searchVal)) return false;
    }
  }
  return true;
}

function rebuildMap() {
  if (!leafletMap || !mapContainer.classList.contains("visible")) return;

  const catVal = filterCat.value;
  const catNum = catVal ? parseInt(catVal) : NaN;
  const searchVal = filterSearch.value.toLowerCase();

  const activeKeys = new Set();
  let colorIdx = 0;

  for (const key in state.tracks) {
    const track = state.tracks[key];
    const entity = track.entity;
    if (!entity || entity.lat == null || entity.lon == null) continue;
    if (!_trackPassesFilter(entity, catVal, catNum, searchVal)) continue;

    activeKeys.add(key);
    const pluginColor = (state.plugins[entity.source_plugin] || {}).color || "#888";

    if (entity.entity_type === "sensor") {
      // Sensor: update in place or create
      const existing = mapSensorMarkers[key];
      if (existing) {
        existing.setLatLng([entity.lat, entity.lon]);
        existing.setTooltipContent(_buildTrackTooltip(entity));
      } else {
        const marker = L.circleMarker([entity.lat, entity.lon], {
          radius: 8, color: "#ffffff", fillColor: pluginColor, fillOpacity: 0.9, weight: 2,
        }).addTo(leafletMap);
        marker.bindTooltip(_buildTrackTooltip(entity), { permanent: false });
        mapSensorMarkers[key] = marker;
      }

    } else if (entity.entity_type === "track" || entity.entity_type === "detection") {
      const history = track.history || [];
      const latlngs = history
        .filter(h => h.lat != null && h.lon != null)
        .map(h => [h.lat, h.lon]);
      latlngs.push([entity.lat, entity.lon]);

      const existing = mapTrackLayers[key];
      if (existing) {
        // Update in place — move marker, update polyline
        existing.marker.setLatLng([entity.lat, entity.lon]);
        existing.polyline.setLatLngs(latlngs);
        existing.marker.setTooltipContent(_buildTrackTooltip(entity));
      } else {
        const color = trackColor(colorIdx);
        const polyline = L.polyline(latlngs, { color, weight: 2, opacity: 0.6 }).addTo(leafletMap);
        const marker = L.circleMarker([entity.lat, entity.lon], {
          radius: 5, color, fillColor: color, fillOpacity: 1, weight: 1,
        }).addTo(leafletMap);
        marker.bindTooltip(_buildTrackTooltip(entity), { permanent: false });
        mapTrackLayers[key] = { polyline, marker };
      }
      colorIdx++;
    }
  }

  // Remove tracks/sensors that are no longer active
  for (const key in mapTrackLayers) {
    if (!activeKeys.has(key)) {
      mapTrackLayers[key].polyline.remove();
      mapTrackLayers[key].marker.remove();
      delete mapTrackLayers[key];
    }
  }
  for (const key in mapSensorMarkers) {
    if (!activeKeys.has(key)) {
      mapSensorMarkers[key].remove();
      delete mapSensorMarkers[key];
    }
  }

  // Only fit bounds on first render (not every periodic update)
  if (_mapFirstRender && activeKeys.size > 0) {
    _mapFirstRender = false;
    const bounds = [];
    for (const key of activeKeys) {
      const e = state.tracks[key].entity;
      bounds.push([e.lat, e.lon]);
    }
    leafletMap.fitBounds(bounds, { padding: [30, 30], maxZoom: 14 });
  }
}

function toggleMap() {
  const show = !mapContainer.classList.contains("visible");
  mapContainer.classList.toggle("visible", show);
  mapResizeHandle.classList.toggle("visible", show);
  mapToggleBtn.classList.toggle("active", show);

  if (show) {
    initMap();
    _mapFirstRender = true; // fit bounds when opening map
    setTimeout(() => {
      leafletMap.invalidateSize();
      rebuildMap();
    }, 100);
  }
}

async function renderSettings() {
  let settingsData, pluginsMeta;
  try {
    const [sResp, pResp] = await Promise.all([fetch("/api/settings"), fetch("/api/plugins")]);
    settingsData = await sResp.json();
    pluginsMeta = await pResp.json();
  } catch (e) {
    settingsContent.innerHTML = '<p style="color:var(--red)">Failed to load settings</p>';
    return;
  }

  let html = '';

  // Global settings
  html += '<div class="settings-section">';
  html += '<div class="settings-section-header" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display===\'none\'?\'flex\':\'none\'">';
  html += '<span class="settings-section-title">Global Settings</span>';
  html += '</div>';
  html += '<div class="settings-section-body">';
  html += '<div class="settings-field"><label>Config Directory</label>';
  html += '<input type="text" value="' + escapeHtml(settingsData.config_dir || "") + '" disabled></div>';

  // Client-side message buffer setting (stored in localStorage)
  html += '<div class="settings-field"><label>Message History (browser)</label>';
  html += '<input type="number" id="settings-max-messages" value="' + getMaxMessages() + '" min="100" max="100000">';
  html += '<span class="field-desc">Max messages kept in browser. Higher values use more memory.</span></div>';

  const globalFields = [
    {key: "web_port", label: "Web Port", type: "number"},
    {key: "track_history_depth", label: "Track History Depth", type: "number"},
    {key: "track_stale_seconds", label: "Track Stale Timeout (s)", type: "number"},
  ];
  for (const f of globalFields) {
    const val = settingsData.global[f.key] || "";
    html += '<div class="settings-field"><label>' + f.label + '</label>';
    html += '<input type="' + f.type + '" data-global-key="' + f.key + '" value="' + val + '"></div>';
  }
  html += '<div class="settings-actions">';
  html += '<button class="settings-btn primary" onclick="saveGlobalSettings()">Save</button>';
  html += '</div></div></div>';

  // Plugin sections
  for (const [pid, meta] of Object.entries(pluginsMeta)) {
    const pSettings = settingsData.plugins[pid] || {};
    const running = meta.running;
    const enabled = meta.enabled;
    const statusCls = !enabled ? "disabled" : running ? "running" : "stopped";
    const statusText = !enabled ? "Disabled" : running ? "Running" : "Stopped";

    html += '<div class="settings-section" data-plugin="' + pid + '">';
    html += '<div class="settings-section-header" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display===\'none\'?\'flex\':\'none\'">';
    html += '<span class="settings-section-title">';
    html += '<span class="settings-plugin-dot" style="background:' + (meta.color || "#888") + '"></span>';
    html += escapeHtml(meta.name || pid);
    html += '</span>';
    html += '<span class="settings-section-status ' + statusCls + '">' + statusText + '</span>';
    html += '</div>';
    html += '<div class="settings-section-body">';

    // Endpoints
    const endpoints = meta.endpoints || [];
    if (endpoints.length > 0) {
      html += '<div class="settings-field" style="margin-bottom:4px"><label>Endpoints</label>';
      html += '<div style="font-family:var(--mono);font-size:11px;color:var(--accent)">';
      html += endpoints.map(ep => escapeHtml(ep)).join('<br>');
      html += '</div></div>';
    }

    // Error
    if (meta.error) {
      html += '<div class="settings-field" style="margin-bottom:4px"><label>Error</label>';
      html += '<div style="font-size:11px;color:var(--red)">' + escapeHtml(meta.error) + '</div></div>';
    }

    // Enable toggle
    html += '<div class="settings-toggle-row">';
    html += '<label style="font-size:13px;color:var(--text)">Enabled</label>';
    html += '<label class="settings-switch">';
    html += '<input type="checkbox" data-plugin-enable="' + pid + '"' + (enabled ? " checked" : "") + '>';
    html += '<span class="slider"></span></label></div>';

    // Plugin settings from schema
    const schema = meta.settings_schema || {};
    const props = schema.properties || {};
    for (const [key, prop] of Object.entries(props)) {
      const val = pSettings[key] !== undefined ? pSettings[key] : (prop.default !== undefined ? prop.default : "");
      const label = prop.title || key;
      const desc = prop.description || "";

      html += '<div class="settings-field">';
      html += '<label>' + escapeHtml(label) + '</label>';

      if (prop.enum) {
        html += '<select data-plugin-setting="' + pid + '.' + key + '">';
        for (const opt of prop.enum) {
          html += '<option value="' + opt + '"' + (String(val) === String(opt) ? ' selected' : '') + '>' + opt + '</option>';

        html += '<input type="number" data-plugin-setting="' + pid + '.' + key + '" value="' + val + '"';
        if (prop.minimum !== undefined) html += ' min="' + prop.minimum + '"';
        if (prop.maximum !== undefined) html += ' max="' + prop.maximum + '"';
        html += '>';
      } else if (prop.type === "boolean") {
        html += '<label class="settings-switch">';
        html += '<input type="checkbox" data-plugin-setting="' + pid + '.' + key + '"' + (val ? " checked" : "") + '>';
        html += '<span class="slider"></span></label>';
      } else {
        html += '<input type="text" data-plugin-setting="' + pid + '.' + key + '" value="' + escapeHtml(String(val === null ? "" : val)) + '">';
      }

      if (desc) html += '<span class="field-desc">' + escapeHtml(desc) + '</span>';
      html += '</div>';
    }

    // Action buttons
    html += '<div class="settings-actions">';
    html += '<button class="settings-btn primary" onclick="savePluginSettings(\'' + pid + '\')">Save</button>';
    html += '<button class="settings-btn" onclick="restartPlugin(\'' + pid + '\')">Restart</button>';
    html += '<button class="settings-btn danger" onclick="stopPlugin(\'' + pid + '\')">Stop</button>';
    html += '</div>';

    html += '</div></div>';
  }

  settingsContent.innerHTML = html;

  // Wire enable toggles
  settingsContent.querySelectorAll("[data-plugin-enable]").forEach(el => {
    el.addEventListener("change", async () => {
      const pid = el.dataset.pluginEnable;
      await fetch("/api/plugins/" + pid + "/enable", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({enabled: el.checked}),
      });
      renderSettings();
    });
  });
}

async function saveGlobalSettings() {
  // Save client-side message history setting
  const maxMsgEl = document.getElementById("settings-max-messages");
  if (maxMsgEl) {
    setMaxMessages(Number(maxMsgEl.value));
  }

  // Save server-side global settings
  const body = {};
  settingsContent.querySelectorAll("[data-global-key]").forEach(el => {
    const key = el.dataset.globalKey;
    body[key] = el.type === "number" ? Number(el.value) : el.value;
  });
  await fetch("/api/settings/global", {
    method: "PUT",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(body),
  });
  renderSettings();
}

async function savePluginSettings(pid) {
  const body = {};
  settingsContent.querySelectorAll("[data-plugin-setting^='" + pid + ".']").forEach(el => {
    const key = el.dataset.pluginSetting.split(".").slice(1).join(".");
    if (el.type === "checkbox") body[key] = el.checked;
    else if (el.type === "number") body[key] = Number(el.value);
    else body[key] = el.value || null;
  });
  const resp = await fetch("/api/settings/" + pid, {
    method: "PUT",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify(body),
  });
  const result = await resp.json();
  renderSettings();
  // Flash feedback on the plugin section header
  const section = settingsContent.querySelector('[data-plugin="' + pid + '"]');
  if (section) {
    const hdr = section.querySelector(".settings-section-status");
    if (hdr) {
      hdr.textContent = result.restarted ? "Restarted" : "Saved";
      hdr.className = "settings-section-status running";
      setTimeout(() => renderSettings(), 1500);
    }
  }
}

async function restartPlugin(pid) {
  await fetch("/api/plugins/" + pid + "/restart", {method: "POST"});
  renderSettings();
}

async function stopPlugin(pid) {
  await fetch("/api/plugins/" + pid + "/stop", {method: "POST"});
  renderSettings();
}

// -----------------------------------------------------------------------
// Theme
// -----------------------------------------------------------------------
const themeToggle = $("#theme-toggle");
const themeIcon = $("#theme-icon");

function getEffectiveTheme() {
  const explicit = document.documentElement.getAttribute("data-theme");
  if (explicit) return explicit;
  return window.matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
}

function updateThemeIcon() {
  const t = getEffectiveTheme();
  themeIcon.innerHTML = t === "dark" ? "&#9790;" : "&#9728;"; // moon / sun
}

function toggleTheme() {
  const current = getEffectiveTheme();
  const next = current === "dark" ? "light" : "dark";
  document.documentElement.setAttribute("data-theme", next);
  localStorage.setItem("asterix-monitor-theme", next);
  updateThemeIcon();
  updateMapTheme();
}

function initTheme() {
  const saved = localStorage.getItem("asterix-monitor-theme");
  if (saved) {
    document.documentElement.setAttribute("data-theme", saved);
  }
  // else: no data-theme attr → follows system via CSS @media
  updateThemeIcon();

  // React to system theme changes when no explicit override
  window.matchMedia("(prefers-color-scheme: light)").addEventListener("change", () => {
    if (!localStorage.getItem("asterix-monitor-theme")) {
      updateThemeIcon();
      updateMapTheme();
    }
  });
}

// -----------------------------------------------------------------------
// Init
// -----------------------------------------------------------------------
function init() {
  initTheme();
  readHash();
  setupResize();
  connectWS();

  // Stats polling every 2s
  pollStats();
  state.statsInterval = setInterval(pollStats, 2000);

  // Event listeners
  playToggle.addEventListener("click", togglePause);
  tailToggle.addEventListener("click", toggleTail);
  themeToggle.addEventListener("click", toggleTheme);
  mapToggleBtn.addEventListener("click", toggleMap);
  settingsToggleBtn.addEventListener("click", toggleSettings);
  $("#clear-all-btn").addEventListener("click", clearAll);
  $("#settings-close").addEventListener("click", toggleSettings);
  settingsOverlay.addEventListener("click", toggleSettings);
  setupMapResize();

  // Sortable column headers
  document.querySelectorAll("#message-list-header .col-header").forEach(el => {
    el.addEventListener("click", () => setSort(el.dataset.sort));
  });
  filterCat.addEventListener("change", onFilterChange);
  filterIP.addEventListener("change", onFilterChange);
  filterFrom.addEventListener("change", onFilterChange);
  filterTo.addEventListener("change", onFilterChange);
  filterSearch.addEventListener("input", onFilterChange);
  clearFilters.addEventListener("click", () => {
    filterCat.value = "";
    filterIP.value = "";
    filterFrom.value = "";
    filterTo.value = "";
    filterSearch.value = "";
    onFilterChange();
  });

  // Detect scroll position — disengage/re-engage tail automatically
  // Ascending: tail edge is bottom. Descending: tail edge is top.
  // Scroll listener — only disengages tail when user scrolls up.
  // Programmatic scrollTop changes set _suppressScrollEvent to prevent false triggers.
  // Re-engaging is only via the Tail button.
  msgList.addEventListener("scroll", () => {
    if (_suppressScrollEvent || !state.autoScroll) return;
    const atBottom = msgList.scrollHeight - msgList.scrollTop - msgList.clientHeight < 40;
    if (!atBottom) {
      state.autoScroll = false;
      updateTailButton();
    }
  });

  // Keyboard navigation
  document.addEventListener("keydown", handleKeyDown);

  // Hash change from browser navigation
  window.addEventListener("hashchange", () => {
    readHash();
    onFilterChange();
  });
}

init();
})();
</script>
